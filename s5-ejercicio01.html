<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clase JavaScript - Funciones, Return y Temporizadores</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f6f9;
      color: #333;
    }

    h1, h2 {
      color: #1e3a8a;
    }

    .bloque {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #reloj, #fechaTexto, #contador {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
      color: #0f172a;
    }

    .carrusel {
      width: 500px;
      max-width: 100%;
      margin: auto;
      text-align: center;
    }

    .carrusel img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .controles {
      margin-top: 10px;
    }

    .mensaje {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }

    input {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      max-width: 250px;
    }
  </style>
</head>
<body>

  <h1>Clase de JavaScript Semana 5</h1>

  <div class="bloque">
    <h2>1. Funciones y argumentos</h2>
    <button onclick="saludarAlumno('Franklin Cappa')" >Saludar</button>
    <button onclick="mostrarSuma(15,8)" >Sumar 15 + 8</button>
    <button onclick="calcularDescuento(200,10)" >Calcular descuento</button>
    <div id="resultadoFunciones"></div>
  </div>

  <div class="bloque">
    <h2>2. Funciones con return</h2>
    <button onclick="probarReturn()" >Probar funciones con return</button>
    <div id="resultadoReturn"></div>
  </div>

  <div class="bloque">
    <h2>3. setTimeout()</h2>
    <button onclick="mostrarMensajeRetraso()" >Mostrar mensaje en 3 segundos</button>
    <div id="mensajeTimeout" class="mensaje"></div>
  </div>

  <div class="bloque">
    <h2>4. setInterval() - Contador automático</h2>
    <button onclick="iniciarContador()">Iniciar Contador</button>
    <button onclick="detenerContador()">Detener Contador</button>
    <div id="contador">0</div>
  </div>

  <div class="bloque">
    <h2>5. Reloj en tiempo real</h2>
    <div id="reloj"></div>
  </div>

  <div class="bloque">
    <h2>6. Fecha en formato texto</h2>
    <div id="fechaTexto"></div>
    <button onclick="mostrarFechaTexto()">Mostrar fecha en texto</button>
  </div>

  <div class="bloque">
    <h2>7. Carrusel de imágenes</h2>
    <div class="carrusel">
      <img id="imagenCarrusel" src="https://picsum.photos/id/1015/800/300" alt="Imagen del carrusel">
      <div class="controles">

      </div>
    </div>
  </div>

  <div class="bloque">
    <h2>8. Ejercicio extra: calcular promedio</h2>
    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <input type="number" id="nota3" placeholder="Nota 3">
    <br>
    
    <div id="resultadoPromedio"></div>
  </div>

  <script src="s5-ejercicio01.js"></script>
</body>
</html>
